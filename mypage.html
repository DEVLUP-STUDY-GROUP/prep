<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>마이페이지 - Prep Education</title>
    <link rel="stylesheet" href="css/payment.css" />
    <style>
      .nav-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 20px;
        background: white;
        border-bottom: 1px solid #e5e7eb;
        max-width: 600px;
        margin: 0 auto;
        border-radius: 12px 12px 0 0;
      }
      .nav-bar .nav-links { display: flex; gap: 16px; align-items: center; }
      .nav-bar a {
        color: #4b5563;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
      }
      .nav-bar a:hover { color: #2563eb; }
      .nav-bar a.active { color: #2563eb; font-weight: 700; }
      .nav-bar .user-name { font-weight: 600; color: #1f2937; }
      .btn-logout {
        background: none;
        border: 1px solid #d1d5db;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.85rem;
        color: #6b7280;
      }
      .btn-logout:hover { background: #f3f4f6; }

      .user-info-card {
        background: #eff6ff;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 24px;
      }
      .user-info-card p { margin: 4px 0; color: #374151; }
      .user-info-card .label { color: #6b7280; font-size: 0.85rem; }

      .payment-card {
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 12px;
      }
      .payment-card .payment-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }
      .payment-card .product-name { font-weight: 600; color: #1f2937; }
      .payment-card .status {
        font-size: 0.8rem;
        padding: 4px 8px;
        border-radius: 4px;
        font-weight: 600;
      }
      .status-DONE { background: #ecfdf5; color: #047857; }
      .status-PENDING { background: #fef3c7; color: #92400e; }
      .status-FAILED { background: #fef2f2; color: #dc2626; }
      .status-CANCELED { background: #f3f4f6; color: #6b7280; }

      .payment-card .payment-detail {
        display: flex;
        justify-content: space-between;
        font-size: 0.9rem;
        color: #6b7280;
        margin-top: 4px;
      }
      .payment-card .amount { font-weight: 700; color: #2563eb; }

      .auth-code-box {
        margin-top: 12px;
        padding: 12px;
        background: #ecfdf5;
        border: 1px solid #10b981;
        border-radius: 6px;
        text-align: center;
      }
      .auth-code-box .code-label { font-size: 0.8rem; color: #065f46; }
      .auth-code-box .code-value {
        font-size: 1.2rem;
        font-weight: 800;
        color: #047857;
        letter-spacing: 2px;
        margin-top: 4px;
      }

      .empty-state {
        text-align: center;
        padding: 40px;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <div class="container" style="padding-top: 0;">
      <nav class="nav-bar">
        <div class="nav-links">
          <a href="index.html">강의 결제</a>
          <a href="mypage.html" class="active">마이페이지</a>
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
          <span class="user-name" id="userName"></span>
          <button class="btn-logout" id="logoutBtn">로그아웃</button>
        </div>
      </nav>

      <header class="header" style="border-radius: 0;">
        <h1>마이페이지</h1>
        <p>결제 내역 및 인증 코드를 확인하세요.</p>
      </header>

      <main class="main-content">
        <div id="loading" class="loading active">
          <div class="spinner"></div>
          <p>불러오는 중...</p>
        </div>

        <div id="content" style="display: none;">
          <!-- 회원 정보 -->
          <div id="userInfo" class="user-info-card"></div>

          <!-- 결제 내역 -->
          <section class="section">
            <h2 class="section-title">결제 내역</h2>
            <div id="paymentList"></div>
          </section>
        </div>
      </main>
    </div>

    <script src="js/common.js"></script>
    <script>
      (function() {

        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');

        if (!token || !user) {
            window.location.href = 'login.html';
            return;
        }

        document.getElementById('userName').textContent = user.name + '님';

        document.getElementById('logoutBtn').addEventListener('click', function() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });

        async function loadData() {
            try {
                // 프로필 & 결제내역 병렬 조회
                const [profileRes, paymentsRes] = await Promise.all([
                    fetch(`${API_BASE_URL}/users/me`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    }),
                    fetch(`${API_BASE_URL}/users/me/payments`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    })
                ]);

                const profileData = await profileRes.json();
                const paymentsData = await paymentsRes.json();

                if (!profileData.success) {
                    // 토큰 만료
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = 'login.html';
                    return;
                }

                // 회원 정보 렌더링
                const u = profileData.user;
                document.getElementById('userInfo').innerHTML = `
                    <p><span class="label">이름:</span> ${u.name}</p>
                    <p><span class="label">이메일:</span> ${u.email}</p>
                    <p><span class="label">연락처:</span> ${u.phone}</p>
                `;

                // 결제 내역 렌더링
                const payments = paymentsData.payments || [];
                const paymentList = document.getElementById('paymentList');

                if (payments.length === 0) {
                    paymentList.innerHTML = '<div class="empty-state"><p>결제 내역이 없습니다.</p><a href="index.html" style="color: #2563eb;">강의 둘러보기</a></div>';
                } else {
                    paymentList.innerHTML = payments.map(p => {
                        const statusText = { DONE: '결제완료', PENDING: '결제대기', FAILED: '결제실패', CANCELED: '취소' };
                        const date = p.paid_at ? new Date(p.paid_at).toLocaleDateString('ko-KR') : new Date(p.created_at).toLocaleDateString('ko-KR');
                        const codeHtml = p.auth_code ? `
                            <div class="auth-code-box">
                                <div class="code-label">인증 코드</div>
                                <div class="code-value">${p.auth_code}</div>
                            </div>
                        ` : '';

                        return `
                            <div class="payment-card">
                                <div class="payment-header">
                                    <span class="product-name">${p.product_name}</span>
                                    <span class="status status-${p.status}">${statusText[p.status] || p.status}</span>
                                </div>
                                <div class="payment-detail">
                                    <span>${date}</span>
                                    <span class="amount">${p.amount.toLocaleString('ko-KR')}원</span>
                                </div>
                                ${codeHtml}
                            </div>
                        `;
                    }).join('');
                }

                document.getElementById('loading').classList.remove('active');
                document.getElementById('content').style.display = 'block';
            } catch (error) {
                console.error('데이터 로드 오류:', error);
                document.getElementById('loading').innerHTML = '<p style="color: #dc2626;">데이터를 불러오는데 실패했습니다.</p>';
            }
        }

        loadData();
      })();
    </script>
  </body>
</html>
