# Prep 결제 모듈 Nginx 설정 - 상용 서버
# 도메인: prep.event-promotion.co.kr
# /prep/ prefix 없이 루트(/)에서 서비스
# 사용법: /etc/nginx/sites-available/prep-prod.conf 로 저장 후 심볼릭 링크 생성
# sudo ln -s /etc/nginx/sites-available/prep-prod.conf /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name prep.event-promotion.co.kr;

    # CSS 파일
    location /css/ {
        alias /app/service/prep/css/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # JavaScript 파일
    location /js/ {
        alias /app/service/prep/js/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 이미지 파일
    location /images/ {
        alias /app/service/prep/images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 템플릿 파일
    location /templates/ {
        alias /app/service/prep/templates/;
    }

    # API 프록시 (/api/ → Node.js /api/)
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # 헬스 체크
    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 정적 파일 (HTML 등)
    location / {
        root /app/service/prep;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # gzip 압축
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 로그
    access_log /var/log/nginx/prep_prod_access.log;
    error_log /var/log/nginx/prep_prod_error.log;
}
