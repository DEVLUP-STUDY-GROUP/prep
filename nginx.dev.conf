# Prep 결제 모듈 Nginx 설정 - 개발 서버 (115.68.179.155)
# /prep/ prefix 사용 (로컬/개발 서버 전용)
# 사용법: 기존 Nginx 설정에 아래 location 블록을 추가하거나
#         /etc/nginx/sites-available/prep.conf 로 저장 후 심볼릭 링크 생성
# sudo ln -s /etc/nginx/sites-available/prep.conf /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name 115.68.179.155;

    # CSS 파일
    location /prep/css/ {
        alias /app/service/prep/css/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # JavaScript 파일
    location /prep/js/ {
        alias /app/service/prep/js/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 이미지 파일
    location /prep/images/ {
        alias /app/service/prep/images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 템플릿 파일
    location /prep/templates/ {
        alias /app/service/prep/templates/;
    }

    # API 프록시 (/prep/api/ → Node.js /api/)
    location /prep/api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # 헬스 체크
    location /prep/health {
        proxy_pass http://127.0.0.1:3001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Prep 정적 파일 (HTML 등)
    location /prep/ {
        alias /app/service/prep/;
        index index.html;
        try_files $uri $uri/ /prep/index.html;
    }

    # gzip 압축
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 로그
    access_log /var/log/nginx/prep_access.log;
    error_log /var/log/nginx/prep_error.log;
}
