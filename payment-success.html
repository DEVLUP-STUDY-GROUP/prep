<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 완료 - Prep Education</title>
    <link rel="stylesheet" href="css/payment.css">
    <style>
        .auth-code-box {
            background: #ecfdf5;
            border: 2px solid #10b981;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            margin: 20px 0;
        }
        .auth-code-box .code-label {
            font-size: 0.9rem;
            color: #065f46;
            margin-bottom: 8px;
        }
        .auth-code-box .code-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #047857;
            letter-spacing: 3px;
        }
        .auth-code-box .code-hint {
            font-size: 0.8rem;
            color: #6b7280;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>결제 처리 중</h1>
            <p>결제를 확인하고 있습니다.</p>
        </header>

        <main class="main-content">
            <!-- 로딩 상태 -->
            <div id="loadingState" class="result-container">
                <div class="loading active">
                    <div class="spinner"></div>
                    <p>결제를 확인하고 있습니다...</p>
                </div>
            </div>

            <!-- 성공 상태 -->
            <div id="successState" class="result-container" style="display: none;">
                <div class="result-icon success">&#10004;</div>
                <h2 class="result-title">결제가 완료되었습니다!</h2>
                <p class="result-message">등록하신 이메일로 인증 코드가 발송됩니다.</p>

                <!-- 인증 코드 표시 -->
                <div id="authCodeBox" class="auth-code-box" style="display: none;">
                    <div class="code-label">발급된 인증 코드</div>
                    <div id="authCodeValue" class="code-value"></div>
                    <div class="code-hint">이 코드는 이메일로도 발송됩니다. 마이페이지에서도 확인 가능합니다.</div>
                </div>

                <div id="paymentDetails" class="result-details">
                    <!-- 결제 상세 정보 -->
                </div>

                <a href="mypage.html" class="btn btn-primary">마이페이지에서 확인</a>
                <a href="index.html" class="btn btn-secondary">홈으로 돌아가기</a>
            </div>

            <!-- 실패 상태 -->
            <div id="failState" class="result-container" style="display: none;">
                <div class="result-icon fail">&#10006;</div>
                <h2 class="result-title">결제 승인에 실패했습니다</h2>
                <p id="failMessage" class="result-message">다시 시도해주세요.</p>

                <a href="index.html" class="btn btn-primary">다시 결제하기</a>
                <a href="index.html" class="btn btn-secondary">홈으로 돌아가기</a>
            </div>
        </main>
    </div>

    <script src="js/common.js"></script>
    <script src="js/payment.js"></script>
    <script>
        (async function() {
            const loadingState = document.getElementById('loadingState');
            const successState = document.getElementById('successState');
            const failState = document.getElementById('failState');
            const failMessage = document.getElementById('failMessage');
            const paymentDetails = document.getElementById('paymentDetails');

            try {
                // 결제 승인 요청
                const result = await PaymentModule.confirmPayment();

                loadingState.style.display = 'none';

                if (result.success) {
                    const urlParams = new URLSearchParams(window.location.search);
                    const orderId = urlParams.get('orderId');
                    const amount = urlParams.get('amount');

                    // 인증 코드 표시
                    if (result.authCode) {
                        document.getElementById('authCodeBox').style.display = 'block';
                        document.getElementById('authCodeValue').textContent = result.authCode;
                    }

                    paymentDetails.innerHTML = `
                        <div class="detail-row">
                            <span class="detail-label">주문번호</span>
                            <span class="detail-value">${orderId}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">결제금액</span>
                            <span class="detail-value">${PaymentModule.formatPrice(parseInt(amount))}원</span>
                        </div>
                    `;

                    successState.style.display = 'block';
                    document.querySelector('.header h1').textContent = '결제 완료';
                    document.querySelector('.header p').textContent = '결제가 성공적으로 완료되었습니다.';
                } else {
                    failMessage.textContent = result.message || '결제 승인에 실패했습니다.';
                    failState.style.display = 'block';
                    document.querySelector('.header h1').textContent = '결제 실패';
                    document.querySelector('.header p').textContent = '결제 처리 중 문제가 발생했습니다.';
                }
            } catch (error) {
                console.error('결제 확인 오류:', error);
                loadingState.style.display = 'none';
                failMessage.textContent = '결제 확인 중 오류가 발생했습니다.';
                failState.style.display = 'block';
            }
        })();
    </script>
</body>
</html>
