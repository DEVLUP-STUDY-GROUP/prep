services:
  db:
    image: mariadb:10.11
    container_name: prep-db
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: riseone
      MYSQL_USER: riseone
      MYSQL_PASSWORD: riseone1234!
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    container_name: prep-app
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      PORT: 3000
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: riseone
      DB_PASSWORD: riseone1234!
      DB_NAME: riseone
      JWT_SECRET: local-dev-jwt-secret
      TOSS_CLIENT_KEY: test_ck_xxx
      TOSS_SECRET_KEY: test_sk_xxx
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: test@gmail.com
      SMTP_PASS: test
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: prep-nginx
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.dev.conf:/etc/nginx/conf.d/default.conf
      - ./index.html:/usr/share/nginx/html/index.html
      - ./admin.html:/usr/share/nginx/html/admin.html
      - ./login.html:/usr/share/nginx/html/login.html
      - ./signup.html:/usr/share/nginx/html/signup.html
      - ./mypage.html:/usr/share/nginx/html/mypage.html
      - ./payment-success.html:/usr/share/nginx/html/payment-success.html
      - ./payment-fail.html:/usr/share/nginx/html/payment-fail.html
      - ./css:/usr/share/nginx/html/css
      - ./js:/usr/share/nginx/html/js
      - ./templates:/usr/share/nginx/html/templates
    depends_on:
      - app

volumes:
  db_data:
